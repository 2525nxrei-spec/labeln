name = "labelun-api"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "."

[vars]
ENVIRONMENT = "production"
FRONTEND_URL = "https://mylabeln.com"
STRIPE_PRICE_LITE = "price_1TF9jz9Fc8Hnuaokq1Fu5boR"
STRIPE_PRICE_STANDARD = "price_1TF9k09Fc8HnuaokatkHmGFM"
STRIPE_PRICE_PRO = "price_1TF9jy9Fc8Hnuaokk74PXZiN"
# STRIPE_PUBLISHABLE_KEY は現在 secret として設定されているが、
# Stripeの公開鍵（pk_live_...）はクライアントに露出する前提の値のため、
# secret（暗号化保管）ではなく [vars] に平文で定義しても問題ない。
# 移行手順:
#   1. Cloudflareダッシュボード > Settings > Environment variables で secret を削除
#   2. 下記のコメントを解除して値を設定
# STRIPE_PUBLISHABLE_KEY = "pk_live_..."

[[d1_databases]]
binding = "DB"
database_name = "labelun-db"
database_id = "81209195-427d-4755-9076-9b2b9e0df5cb"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "labelun-storage"

# Secrets（wrangler secret put で設定）
# wrangler secret put GEMINI_API_KEY
# wrangler secret put STRIPE_SECRET_KEY
# wrangler secret put STRIPE_WEBHOOK_SECRET
# wrangler secret put JWT_SECRET
# wrangler secret put STRIPE_PUBLISHABLE_KEY  ← 公開鍵のためvarsへの移行を推奨（上記コメント参照）
