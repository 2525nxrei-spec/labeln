<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="ラベルン ダッシュボード - ラベル一覧、利用状況、作成履歴">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#0f766e">
  <title>ダッシュボード | ラベルン</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/app.css">
  <style>
    :root {
      --color-primary: #0f766e;
      --color-primary-hover: #0d6359;
      --color-secondary: #1e293b;
      --color-accent: #14b8a6;
      --color-bg: #ffffff;
      --color-bg-warm: #f0fdfa;
      --color-bg-sidebar: #1e293b;
      --color-text: #1e293b;
      --color-text-muted: #64748b;
      --color-border: #e2e8f0;
      --color-success: #16a34a;
      --color-warning: #d97706;
      --color-error: #dc2626;
      --sidebar-width: 260px;
      --header-height: 64px;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
      --shadow-md: 0 4px 12px rgba(0,0,0,.1);
      --transition: .2s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--color-text);
      background: var(--color-bg-warm);
      line-height: 1.6;
      min-height: 100vh;
    }

    .app-layout { display: flex; min-height: 100vh; }

    /* サイドバー */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--color-bg-sidebar);
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform var(--transition);
    }
    .sidebar__brand {
      height: var(--header-height);
      display: flex;
      align-items: center;
      padding: 0 24px;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .sidebar__brand span { color: #fff; }
    .sidebar__nav { flex: 1; padding: 16px 12px; }
    .sidebar__nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      color: #cbd5e1;
      text-decoration: none;
      font-size: .9rem;
      transition: background var(--transition), color var(--transition);
      cursor: pointer;
    }
    .sidebar__nav-item:hover,
    .sidebar__nav-item[aria-current="page"] {
      background: rgba(255,255,255,.1);
      color: #fff;
    }
    .sidebar__nav-item[aria-current="page"] {
      border-left: 3px solid var(--color-accent);
    }
    .sidebar__nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
    .sidebar__footer {
      padding: 16px 24px;
      border-top: 1px solid rgba(255,255,255,.1);
      font-size: .8rem;
      color: #64748b;
    }

    /* サイドバーオーバーレイ */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 99;
    }
    .sidebar-overlay[data-visible="true"] { display: block; }

    /* メインエリア */
    .main-area {
      flex: 1;
      margin-left: var(--sidebar-width);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ヘッダー */
    .app-header {
      height: var(--header-height);
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .app-header__title { font-size: 1.1rem; font-weight: 700; }
    .app-header__actions { display: flex; align-items: center; gap: 16px; }
    .hamburger-btn {
      display: none;
      background: none;
      border: none;
      color: var(--color-text);
      cursor: pointer;
      padding: 4px;
    }
    .hamburger-btn svg { width: 28px; height: 28px; }
    .gap-row { display: flex; gap: 12px; align-items: center; }

    /* ダッシュボードコンテンツ */
    .dashboard-content {
      flex: 1;
      padding: 32px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    /* 利用状況 */
    .usage-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .usage-card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 24px;
    }
    .usage-card__label {
      font-size: .85rem;
      color: var(--color-text-muted);
      margin-bottom: 8px;
    }
    .usage-card__value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--color-text);
    }
    .usage-card__sub {
      font-size: .8rem;
      color: var(--color-text-muted);
      margin-top: 4px;
    }

    /* プラン表示 */
    .plan-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 9999px;
      font-size: .75rem;
      font-weight: 600;
      background: #ccfbf1;
      color: var(--color-primary);
    }

    /* セクション見出し */
    .section-heading {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--color-border);
    }

    /* 履歴テーブル */
    .history-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 32px;
    }
    .history-table th,
    .history-table td {
      padding: 12px 16px;
      text-align: left;
      font-size: .875rem;
      border-bottom: 1px solid var(--color-border);
    }
    .history-table th {
      background: #f8fafc;
      font-weight: 600;
      color: var(--color-text-muted);
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .history-table tr:last-child td { border-bottom: none; }
    .history-table td a {
      color: var(--color-primary);
      text-decoration: none;
    }
    .history-table td a:hover {
      text-decoration: underline;
    }

    /* ステータスバッジ */
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: .75rem;
      font-weight: 500;
    }
    .status-badge--complete {
      background: #dcfce7;
      color: #166534;
    }
    .status-badge--draft {
      background: #fef3c7;
      color: #92400e;
    }

    /* クイックアクション */
    .quick-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
    }
    .quick-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: .9rem;
      color: var(--color-text);
      text-decoration: none;
      cursor: pointer;
      transition: border-color var(--transition);
    }
    .quick-action-btn:hover {
      border-color: var(--color-primary);
    }
    .quick-action-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* 空状態 */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--color-text-muted);
    }
    .empty-state__text {
      font-size: .95rem;
      margin-bottom: 16px;
    }

    /* ボタン */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: .9rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: background var(--transition), border-color var(--transition);
    }
    .btn--primary {
      background: var(--color-primary);
      color: #fff;
    }
    .btn--primary:hover { background: var(--color-primary-hover); }
    .btn--ghost {
      background: none;
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
    }
    .btn--ghost:hover { border-color: var(--color-primary); }

    /* レスポンシブ */
    @media (max-width: 767px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar[data-open="true"] { transform: translateX(0); }
      .main-area { margin-left: 0; }
      .hamburger-btn { display: flex !important; }
      .dashboard-content { padding: 16px; }
      .usage-summary { grid-template-columns: 1fr; }
      .quick-actions { flex-direction: column; }
      .app-header { padding: 0 16px; }
      .app-header__title { font-size: .95rem; }
      .history-table { font-size: .8rem; }
      .history-table th, .history-table td { padding: 8px 10px; }
    }
  </style>
</head>
<body>

    <!-- メインエリア -->

      <header class="app-header">
        <div class="gap-row">

          </button>
          <h1 class="app-header__title">ダッシュボード</h1>
        </div>
        <div class="app-header__actions">

      <div class="dashboard-content">
        <!-- 利用状況サマリ -->
        <div class="usage-summary">

            <p class="usage-card__value">3 <span style="font-size:.9rem;font-weight:400;color:var(--color-text-muted)">/ 50</span></p>

            <p class="usage-card__sub">下書き 2件を含む</p>

        <!-- クイックアクション -->
        <div class="quick-actions">
          <a href="app.html" class="quick-action-btn">

            新規作成
          </a>
          <a href="history.html" class="quick-action-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>

          </a>

      </div>
    </main>
  </div>

  <!-- サイドバー開閉 -->
  <script>
    (function() {
      var hamburger = document.getElementById('hamburger-btn');
      var sidebar = document.getElementById('sidebar');
      var overlay = document.getElementById('sidebar-overlay');

      function openSidebar() {
        sidebar.setAttribute('data-open', 'true');
        overlay.setAttribute('data-visible', 'true');
        overlay.setAttribute('aria-hidden', 'false');
        hamburger.setAttribute('aria-expanded', 'true');
      }
      function closeSidebar() {
        sidebar.setAttribute('data-open', 'false');
        overlay.setAttribute('data-visible', 'false');
        overlay.setAttribute('aria-hidden', 'true');
        hamburger.setAttribute('aria-expanded', 'false');
      }

      hamburger.addEventListener('click', function() {
        var isOpen = sidebar.getAttribute('data-open') === 'true';
        if (isOpen) { closeSidebar(); } else { openSidebar(); }
      });
      overlay.addEventListener('click', closeSidebar);
    })();
  </script>

  <script src="js/auth.js" defer></script>
  <script src="js/app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    }
  </script>
</body>
